<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    /* LAYER 1: VirtualSky iframe — fills the whole page */
    #starmap {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    /* LAYER 2: Transparent overlay — captures mouse movement,
       passes pointer-events through to anything underneath */
    #mouse-capture {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background: transparent;
    }

    /* LAYER 3: Your content — pointer-events:none so mouse still reaches layer 2 */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    #content {
      position: absolute;
      top: 10%;
      left: 5%;
      color: white;
      font-family: 'Times New Roman', Times, serif;
      font-size: 21px;
      line-height: 1.6;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    /* Add class="clickable" to any child element that needs to receive clicks */
    .clickable {
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- LAYER 1: VirtualSky via official iframe embed (Kalispell, MT) -->
  <iframe
    id="starmap"
    src="https://slowe.github.io/VirtualSky/embed?projection=gnomic&latitude=48.379471&longitude=-114.24657&live=true&scalestars=2&az=180&mouse=false&keyboard=false&gradient=true&cardinalpoints=true"
    scrolling="no"
    allowfullscreen>
  </iframe>

  <!-- LAYER 2: Captures mouse position to drive sky scroll -->
  <div id="mouse-capture"></div>

  <!-- LAYER 3: Your overlay content here -->
  <div id="overlay">
    <div id="content">
      <!-- ✏️ Add your text, images, logos etc. here -->
    </div>
  </div>

  <script>
    const iframe = document.getElementById('starmap');
    const capture = document.getElementById('mouse-capture');

    let mouseX = window.innerWidth  / 2;
    let mouseY = window.innerHeight / 2;

    let az  = 180;
    let alt = 45;

    capture.addEventListener("mousemove", function (e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animate() {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;

      const dx = (mouseX - cx) / cx;   // -1 (left) to 1 (right)
      const dy = (mouseY - cy) / cy;   // -1 (top)  to 1 (bottom)

      const speed = 0.15;

      az  += dx * speed;
      alt -= dy * speed;

      az  = (az + 360) % 360;
      alt = Math.max(10, Math.min(80, alt));

      // Send the updated az/alt into the iframe via postMessage
      iframe.contentWindow.postMessage({
        az:  az,
        alt: alt
      }, '*');

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
