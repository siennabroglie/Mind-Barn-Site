<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Caveat', cursive;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    #click-catcher {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
    }
    #click-catcher.open { display: block; }

    /* Panel — anchored top-right, scaled to sit beside the help icon.
       Clips everything inside it, grows downward on open.                 */
    #menu-panel {
      position: absolute;
      top: 0; right: 0;
      z-index: 60;            /* above #click-catcher (50) so labels stay hoverable/clickable */
      transform: scale(0.65);
      transform-origin: top right;
      background: transparent;
      cursor: pointer;
      width: 360px;
      height: 72px;
      overflow: hidden;
      transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Inner container — burger pinned to the right edge */
    #burger-wrap {
      position: absolute;
      top: 0; right: 8px;
      width: 56px;
      /* height expands to hold all spread ingredients */
      height: 56px;
      transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Each ingredient is absolutely positioned, slides to its open Y */
    .ing {
      position: absolute;
      right: 0;
      width: 56px;
      transition: top 0.6s cubic-bezier(0.34, 1.1, 0.64, 1);
    }
    .ing svg { display: block; overflow: visible; }

    /* Labels sit to the LEFT of the burger, right-aligned, absolutely positioned */
    .ing-label {
      position: absolute;
      right: 72px;
      text-align: right;
      font-family: 'Caveat', cursive;
      /* 35px here renders ~23px on screen once the panel's 0.65 scale is applied,
         matching the help popup's 23px body text. */
      font-size: 35px;
      color: #000;
      background: rgba(255, 255, 255, 0.75);
      padding: 5px 12px;
      border-radius: 8px;
      text-decoration: none;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(6px);
      transition: opacity 0.3s ease, transform 0.3s ease, color 0.2s ease, background 0.2s ease;
      pointer-events: none;
      /* vertically centered on its ingredient */
      line-height: 1;
    }
    .ing-label.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .ing-label:hover { color: #f95921; background: rgba(255, 255, 255, 1); }
  </style>
</head>
<body>

<div id="click-catcher"></div>

<div id="menu-panel">
  <div id="burger-wrap">

    <!-- Each .ing has data-closed-top (stacked pos) and data-open-top (spread pos) -->
    <!-- Heights are in px within the 56px-wide fixed SVG coordinate space         -->

    <!-- TOP BUN -->
    <div class="ing" id="ing-bun-top" data-closed="0" data-open="0">
      <svg width="56" height="22" viewBox="0 0 56 22"
           fill="none" stroke="#111" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M4,20 Q4,2 28,2 Q52,2 52,20" fill="white"/>
        <ellipse cx="20" cy="10" rx="2.2" ry="1.1" transform="rotate(-25,20,10)" fill="#111" stroke="none"/>
        <ellipse cx="28" cy="7"  rx="2.2" ry="1.1" transform="rotate(5,28,7)"   fill="#111" stroke="none"/>
        <ellipse cx="36" cy="10" rx="2.2" ry="1.1" transform="rotate(20,36,10)" fill="#111" stroke="none"/>
        <rect x="4" y="19" width="48" height="3" rx="1.5" fill="white"/>
      </svg>
    </div>

    <!-- LETTUCE -->
    <div class="ing" id="ing-lettuce" data-closed="20" data-open="320">
      <svg width="56" height="14" viewBox="0 0 56 14"
           fill="none" stroke="#fff" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M1,7 Q8,1 15,7 Q22,13 29,7 Q36,1 43,7 Q49,11 55,7"/>
        <path d="M1,10 Q8,4 15,10 Q22,16 29,10 Q36,4 43,10 Q49,14 55,10"
              stroke-width="1" opacity="0.3"/>
      </svg>
    </div>

    <!-- TOMATO -->
    <div class="ing" id="ing-tomato" data-closed="26" data-open="160">
      <svg width="56" height="12" viewBox="0 0 56 12"
           fill="none" stroke="#111" stroke-width="1.4"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="1" width="52" height="10" rx="1.5" fill="white"/>
        <line x1="20" y1="1" x2="20" y2="11" stroke-width="1"/>
        <line x1="36" y1="1" x2="36" y2="11" stroke-width="1"/>
        <ellipse cx="10" cy="6" rx="2.8" ry="1.6" fill="white"/>
        <ellipse cx="28" cy="6" rx="2.8" ry="1.6" fill="white"/>
        <ellipse cx="46" cy="6" rx="2.8" ry="1.6" fill="white"/>
      </svg>
    </div>

    <!-- ONION -->
    <div class="ing" id="ing-onion" data-closed="33" data-open="80">
      <svg width="56" height="14" viewBox="0 0 56 14"
           fill="none" stroke="#fff" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M1,7 Q14,0 28,7 Q42,14 55,7"/>
        <path d="M1,10 Q14,3 28,10 Q42,17 55,10" stroke-width="1" opacity="0.3"/>
        <path d="M1,4  Q14,-3 28,4  Q42,11 55,4"  stroke-width="1" opacity="0.3"/>
      </svg>
    </div>

    <!-- PATTY -->
    <div class="ing" id="ing-patty" data-closed="40" data-open="240">
      <svg width="56" height="16" viewBox="0 0 56 16"
           fill="none" stroke="#111" stroke-width="1.6"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="52" height="12" rx="5" fill="white"/>
        <line x1="18" y1="3"  x2="16.5" y2="13" stroke-width="1.3" opacity="0.4"/>
        <line x1="28" y1="3"  x2="26.5" y2="13" stroke-width="1.3" opacity="0.4"/>
        <line x1="38" y1="3"  x2="36.5" y2="13" stroke-width="1.3" opacity="0.4"/>
      </svg>
    </div>

    <!-- BOTTOM BUN -->
    <div class="ing" id="ing-bun-bottom" data-closed="48" data-open="400">
      <svg width="56" height="14" viewBox="0 0 56 14"
           fill="none" stroke="#111" stroke-width="1.4"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M4,1 L52,1 Q54,1 54,4 L54,11 Q54,14 52,14 L4,14 Q2,14 2,11 L2,4 Q2,1 4,1 Z"
              fill="white"/>
        <path d="M4,10 Q28,15 52,10" stroke-width="1" opacity="0.3"/>
      </svg>
    </div>

    <!-- Labels — top set by JS to vertically center on open ingredient position -->
    <!-- Top and bottom buns intentionally have no menu label -->
    <a class="ing-label" id="label-onion"      href="YOUR_URL_HERE">About</a>
    <a class="ing-label" id="label-tomato"     href="YOUR_URL_HERE">Selected Works</a>
    <a class="ing-label" id="label-patty"      href="YOUR_URL_HERE">Works in Progress</a>
    <a class="ing-label" id="label-lettuce"    href="YOUR_URL_HERE">Manifestio</a>

  </div>
</div>

<script>
  const panel   = document.getElementById('menu-panel');
  const wrap    = document.getElementById('burger-wrap');
  const catcher = document.getElementById('click-catcher');

  const layers = [
    { ing: 'ing-bun-top',    label: null,               ingH: 22 },
    { ing: 'ing-onion',      label: 'label-onion',      ingH: 14 },
    { ing: 'ing-tomato',     label: 'label-tomato',     ingH: 12 },
    { ing: 'ing-patty',      label: 'label-patty',      ingH: 16 },
    { ing: 'ing-lettuce',    label: 'label-lettuce',    ingH: 14 },
    { ing: 'ing-bun-bottom', label: null,               ingH: 14 },
  ];

  const PANEL_PADDING = 8;  // panel padding top
  const WRAP_MARGIN   = 8;  // burger-wrap margin

  let isOpen = false;

  // Tell the parent page (the game) when we open/close so it can resize this
  // iframe — small when closed (so the game stays clickable), full-screen when
  // open (so the click-to-close catcher works).
  function notifyParent(state) {
    if (window.parent !== window) window.parent.postMessage('burger-' + state, '*');
  }

  // Read closed/open positions from data attributes
  layers.forEach(l => {
    const el = document.getElementById(l.ing);
    l.closedTop = parseInt(el.dataset.closed);
    l.openTop   = parseInt(el.dataset.open);
    // Set initial position
    el.style.top = l.closedTop + 'px';
    // Pre-position labels at open pos, centered on ingredient
    if (!l.label) return;
    const labelEl = document.getElementById(l.label);
    labelEl.style.top = (l.openTop + l.ingH / 2 - 22) + 'px';
  });

  // Closed sizes
  const lastLayer   = layers[layers.length - 1];
  const CLOSED_WRAP = lastLayer.closedTop + lastLayer.ingH;
  const CLOSED_PANEL = CLOSED_WRAP + PANEL_PADDING + WRAP_MARGIN + 8;

  // Open sizes
  const OPEN_WRAP  = lastLayer.openTop + lastLayer.ingH;
  const OPEN_PANEL = OPEN_WRAP + PANEL_PADDING + WRAP_MARGIN + 16;

  wrap.style.height  = CLOSED_WRAP + 'px';
  panel.style.height = CLOSED_PANEL + 'px';

  function openMenu() {
    isOpen = true;
    notifyParent('open');
    catcher.classList.add('open');

    // Slide ingredients apart
    layers.forEach(l => {
      document.getElementById(l.ing).style.top = l.openTop + 'px';
    });

    // Grow panel and wrap
    wrap.style.height  = OPEN_WRAP + 'px';
    panel.style.height = OPEN_PANEL + 'px';

    // Stagger labels
    layers.forEach((l, i) => {
      if (!l.label) return;
      setTimeout(() => {
        document.getElementById(l.label).classList.add('visible');
      }, 280 + i * 65);
    });
  }

  function closeMenu() {
    isOpen = false;
    notifyParent('closed');
    catcher.classList.remove('open');

    // Hide labels
    layers.forEach(l => { if (l.label) document.getElementById(l.label).classList.remove('visible'); });

    // Slide ingredients back together
    layers.forEach(l => {
      document.getElementById(l.ing).style.top = l.closedTop + 'px';
    });

    // Shrink panel
    wrap.style.height  = CLOSED_WRAP + 'px';
    panel.style.height = CLOSED_PANEL + 'px';
  }

  panel.addEventListener('click', e => {
    e.stopPropagation();
    isOpen ? closeMenu() : openMenu();
  });

  catcher.addEventListener('click', closeMenu);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && isOpen) closeMenu();
  });
</script>

</body>
</html>
