<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <title>Star Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: black; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

    /* ── Shared text styles ── */
    .col {
      position: absolute;
      color: white;
      font-family: 'Times New Roman', Times, serif;
      font-size: 21px;
      line-height: 1.6;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      pointer-events: none;
      white-space: pre-wrap;
    }

    /* ── Desktop / tablet (≥768px): two columns ── */
    #col1 {
      top: 10%;
      left: 5%;
      width: 38%;
    }
    #col2 {
      top: 10%;
      left: 50%;
      width: 38%;
      display: none; /* hidden until col1 is full */
    }

    /* ── Phone (<768px): single scrolling column ── */
    #phone-content {
      position: absolute;
      left: 5%;
      width: 90%;
      color: white;
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      line-height: 1.6;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      pointer-events: none;
      white-space: pre-wrap;
      display: none;
    }

    /* ── Link lines ── */
    .link-line {
      font-weight: bold;
      color: #f95921;
      pointer-events: auto;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .link-line:hover { text-decoration: underline; }

    /* ── Blinking cursor ── */
    #cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: white;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Phone overrides ── */
    @media (max-width: 767px) {
      #col1, #col2 { display: none !important; }
      #phone-content { display: block; }
    }
    @media (min-width: 768px) {
      #phone-content { display: none !important; }
    }
  </style>
</head>

// ─────────────────────────────────────────────────────────────────────────────
// OBSERVER LOCATION — Kalispell, MT
// ─────────────────────────────────────────────────────────────────────────────
const LAT_DEG =  48.3795;
const LON_DEG = -114.2468;
const LAT = LAT_DEG * Math.PI / 180;

// ─────────────────────────────────────────────────────────────────────────────
// ASTRONOMY — Convert RA/Dec to Altitude/Azimuth for current time + location
// ─────────────────────────────────────────────────────────────────────────────
function getJulianDate(date) {
  return date.getTime() / 86400000 + 2440587.5;
}

function getGMST(jd) {
  // Greenwich Mean Sidereal Time in degrees
  const T = (jd - 2451545.0) / 36525.0;
  let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0)
           + 0.000387933 * T * T - T * T * T / 38710000.0;
  return ((gmst % 360) + 360) % 360;
}

function raDecToAltAz(ra_hours, dec_deg) {
  const jd   = getJulianDate(new Date());
  const gmst = getGMST(jd);
  const lst  = ((gmst + LON_DEG) % 360 + 360) % 360; // Local Sidereal Time, degrees

  const ra_deg = ra_hours * 15;
  const ha = (lst - ra_deg + 360) % 360; // Hour Angle in degrees
  const H  = ha * Math.PI / 180;
  const d  = dec_deg * Math.PI / 180;

  const sinAlt = Math.sin(d) * Math.sin(LAT) + Math.cos(d) * Math.cos(LAT) * Math.cos(H);
  const alt    = Math.asin(sinAlt);

  const cosAz  = (Math.sin(d) - Math.sin(alt) * Math.sin(LAT)) / (Math.cos(alt) * Math.cos(LAT));
  const clampedCosAz = Math.max(-1, Math.min(1, cosAz));
  let az = Math.acos(clampedCosAz);
  if (Math.sin(H) > 0) az = 2 * Math.PI - az;

  return { alt, az };
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEW STATE — view direction in alt/az
// These are offsets from the computed real sky position
// ─────────────────────────────────────────────────────────────────────────────
let viewAzOffset  = 0;   // radians, user can pan left/right
let viewAltOffset = 0;   // radians, user can pan up/down

let mx = 0, my = 0;

document.addEventListener('mousemove', function(e) {
  mx = (e.clientX - window.innerWidth  / 2) / (window.innerWidth  / 2);
  my = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
});

// ─────────────────────────────────────────────────────────────────────────────
// PROJECTION — gnomonic (perspective) projection
// ─────────────────────────────────────────────────────────────────────────────
function project(altRad, azRad, centerAlt, centerAz) {
  // Rotate star position relative to view center
  const dAz  = azRad - centerAz;
  const dAlt = altRad - centerAlt;

  // Convert to cartesian on unit sphere
  const x = Math.cos(altRad) * Math.sin(dAz);
  const y = Math.sin(altRad) * Math.cos(centerAlt)
          - Math.cos(altRad) * Math.sin(centerAlt) * Math.cos(dAz);
  const z = Math.sin(altRad) * Math.sin(centerAlt)
          + Math.cos(altRad) * Math.cos(centerAlt) * Math.cos(dAz);

  if (z <= 0.01) return null; // behind view

  const fov   = 1.4;
  const scale = Math.min(canvas.width, canvas.height) / fov;

  return {
    x: canvas.width  / 2 + (x / z) * scale,
    y: canvas.height / 2 - (y / z) * scale,
    z
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// PLANET POSITIONS — Low-precision orbital elements (J2000.0)
// ─────────────────────────────────────────────────────────────────────────────
function getPlanetPositions() {
  const jd = getJulianDate(new Date());
  const T  = (jd - 2451545.0) / 36525.0;
  const DEG = Math.PI / 180;
  const planets = [];

  function toRADec(L, B) {
    const eps = (23.439291111 - 0.013004167 * T) * DEG;
    const x = Math.cos(B) * Math.cos(L);
    const y = Math.cos(eps) * Math.cos(B) * Math.sin(L) - Math.sin(eps) * Math.sin(B);
    const z = Math.sin(eps) * Math.cos(B) * Math.sin(L) + Math.cos(eps) * Math.sin(B);
    const ra  = ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    const dec = Math.asin(Math.max(-1, Math.min(1, z))) * 180 / Math.PI;
    return { ra: ra / 15, dec };
  }

  const bodies = [
    { name: 'Mercury', L0: 252.250906, dL: 149472.6746358, color: '#cccccc', size: 3,   mag:  0.0 },
    { name: 'Venus',   L0: 181.979801, dL:  58517.8156760, color: '#fffde0', size: 5,   mag: -4.0 },
    { name: 'Mars',    L0: 355.433000, dL:  19140.2993313, color: '#ffddcc', size: 3.5, mag:  0.5 },
    { name: 'Jupiter', L0:  34.351519, dL:   3034.9056606, color: '#f5e6c8', size: 5.5, mag: -2.0 },
    { name: 'Saturn',  L0:  50.077444, dL:   1222.1138488, color: '#f0e4b0', size: 4,   mag:  0.7 },
  ];

  for (const b of bodies) {
    const L = ((b.L0 + b.dL * T) * DEG) % (2 * Math.PI);
    const pos = toRADec(L, 0);
    const altaz = raDecToAltAz(pos.ra, pos.dec);
    planets.push({ name: b.name, alt: altaz.alt, az: altaz.az, color: b.color, size: b.size, mag: b.mag });
  }

  return planets;
}

// ─────────────────────────────────────────────────────────────────────────────
// PRECOMPUTE star alt/az — recalculate every 60s for performance
// ─────────────────────────────────────────────────────────────────────────────

function recomputeStars() {
  cachedStars = CATALOG.map(([ra, dec, mag, name]) => {
    const pos = raDecToAltAz(ra, dec);
    return { alt: pos.alt, az: pos.az, mag, name };
  });
  cachedPlanets = getPlanetPositions();
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────────────────
let time = 0;

function draw() {
  time += 0.02;

  // Recompute real positions every 60 seconds
  const now = Date.now();
  if (now - lastCalcTime > 60000) {
    recomputeStars();
    lastCalcTime = now;
  }

  // Cursor-driven pan — cubic curve so speed stays near zero until edge of screen
  // mx/my are -1 to 1; raising to power 3 keeps center very slow, accelerates at edges
  const deadZone = 0.15;
  const speed    = 0.012;
  const ax = Math.abs(mx) > deadZone ? Math.sign(mx) * Math.pow(Math.abs(mx), 3) : 0;
  const ay = Math.abs(my) > deadZone ? Math.sign(my) * Math.pow(Math.abs(my), 3) : 0;
  viewAzOffset  += ax * speed;
  viewAltOffset -= ay * speed;

  // Wrap az, clamp alt so you don't go past zenith/nadir
  viewAzOffset  = ((viewAzOffset  % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  viewAltOffset = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, viewAltOffset));

  // View center: start facing south (az=PI) at 45° altitude, plus user offset
  const centerAz  = (Math.PI + viewAzOffset)  % (Math.PI * 2);
  const centerAlt = Math.PI / 4 + viewAltOffset;

  // Clear
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw stars
  for (let i = 0; i < cachedStars.length; i++) {
    const s = cachedStars[i];
    const p = project(s.alt, s.az, centerAlt, centerAz);
    if (!p) continue;
    if (p.x < -20 || p.x > canvas.width + 20) continue;
    if (p.y < -20 || p.y > canvas.height + 20) continue;

    // Size: higher floor so dim stars stay visible
    const brightness = Math.max(0, (6.5 - s.mag) / 6.5);
    const size = Math.pow(brightness, 1.2) * 2.5 + 0.6;

    // Very subtle twinkle — all stars, barely perceptible
    const twinkle = brightness * (0.92 + 0.08 * Math.sin(time * 1.5 + i * 2.3));

    // Raised alpha floor so faint stars don't disappear
    const alpha = Math.min(1, Math.max(0.35, twinkle));

    // Glow for bright stars
    if (s.mag < 2.5) {
      const glowR = size * 5;
      const glow  = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
      glow.addColorStop(0, `rgba(255,255,255,${alpha * 0.35})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Star dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  }

  // Draw planets
  for (let i = 0; i < cachedPlanets.length; i++) {
    const planet = cachedPlanets[i];
    const p = project(planet.alt, planet.az, centerAlt, centerAz);
    if (!p) continue;
    if (p.x < -20 || p.x > canvas.width + 20) continue;
    if (p.y < -20 || p.y > canvas.height + 20) continue;

    // Outer glow
    const glowR = planet.size * 6;
    const glow  = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
    glow.addColorStop(0, 'rgba(255,255,255,0.4)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Planet disc
    ctx.beginPath();
    ctx.arc(p.x, p.y, planet.size, 0, Math.PI * 2);
    ctx.fillStyle = planet.color;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

// Initial compute then start
recomputeStars();
lastCalcTime = Date.now();
draw();

// ─────────────────────────────────────────────────────────────────────────────
// TYPEWRITER
// ─────────────────────────────────────────────────────────────────────────────
const IS_PHONE = window.innerWidth < 768;

// Text split: body text | link lines (last 2)
const bodyText =
`We believe in barns not just as buildings, but as metaphors.

Where stories are stored in hay bales,
Donor moments hang from rusted hooks,
Every ladder leads to a forgotten game,
Every storm cellar hides a truth too soggy to explain.

The Mind Barn is not a brand.
It's a barn door left open.
Ideas escape. Visitors wander.
Some paint the walls. Some fix the roof.
Some just sit in the loft and listen.

There is mystery in the rafters.
There is memory in the mudroom.

This is not a website.
This is a living structure.
A place to play, archive, remember, and repair.

`;

const linkLines = [
  { text: 'WELCOME TO THE MIND BARN.', url: 'YOUR_URL_HERE' },
  { text: "DON'T FORGET TO CHECK THE ATTIC.", url: 'YOUR_URL_HERE' }
];

const fullText = bodyText + linkLines.map(l => l.text).join('\n');

// ── Helpers ──────────────────────────────────────────────────────────────────
const baseSpeed     = 55;
const speedVariance = 20;
const pauseChance   = 0.08;
const pauseDuration = [200, 400];

function randomBetween(min, max) { return Math.random() * (max - min) + min; }

// Append link lines as styled <a> elements to a container
function appendLinkLines(container) {
  linkLines.forEach(l => {
    const a = document.createElement('a');
    a.className   = 'link-line';
    a.textContent = l.text;
    a.href        = l.url;
    a.target      = '_blank';
    container.appendChild(a);
  });
}

// ── Skip-to-end on click/tap ──────────────────────────────────────────────────
let finished = false;

function skipToEnd() {
  if (finished) return;
  finished = true;

  if (IS_PHONE) {
    const ph = document.getElementById('text-phone');
    const cp = document.getElementById('cursor-phone');
    ph.textContent = bodyText;
    appendLinkLines(ph.parentNode);
    if (cp) cp.remove();
    // keep scroll position correct
    adjustPhoneScroll();
  } else {
    // Fill whichever column is active, hide cursor
    const t1 = document.getElementById('text1');
    const t2 = document.getElementById('text2');
    const cur = document.getElementById('cursor');
    const col2 = document.getElementById('col2');

    t1.textContent = bodyText;
    // Check if col1 overflows
    setTimeout(() => {
      if (col1Overflows()) {
        splitIntoColumns();
      } else {
        appendLinkLines(t1.parentNode);
      }
      if (cur) cur.remove();
    }, 50);
  }
}

document.addEventListener('click',     skipToEnd);
document.addEventListener('touchstart', skipToEnd, { passive: true });

// ── DESKTOP / TABLET ─────────────────────────────────────────────────────────
if (!IS_PHONE) {
  const col1El  = document.getElementById('col1');
  const col2El  = document.getElementById('col2');
  const text1El = document.getElementById('text1');
  const text2El = document.getElementById('text2');
  const cursorEl = document.getElementById('cursor');

  const TOP_PCT    = 0.10;
  const BOTTOM_PCT = 0.90;

  col1El.style.top = (window.innerHeight * TOP_PCT) + 'px';
  col2El.style.top = (window.innerHeight * TOP_PCT) + 'px';

  function col1Overflows() {
    const maxBottom = window.innerHeight * BOTTOM_PCT;
    return col1El.getBoundingClientRect().bottom > maxBottom;
  }

  // Once col1 is full: freeze its text, move overflow to col2
  function splitIntoColumns() {
    const allText  = text1El.textContent;
    const words    = allText.split(' ');
    col2El.style.display = 'block';

    // Binary search for split point
    let lo = 0, hi = words.length;
    while (lo < hi - 1) {
      const mid = Math.floor((lo + hi) / 2);
      text1El.textContent = words.slice(0, mid).join(' ');
      if (col1Overflows()) hi = mid; else lo = mid;
    }
    text2El.textContent = words.slice(lo).join(' ');
    appendLinkLines(col2El);

    // Move cursor to col2
    col2El.appendChild(cursorEl);
  }

  let index = 0;
  let inCol2 = false;

  function typeNextDesktop() {
    if (finished) return;
    if (index >= fullText.length) {
      // Done — append link lines
      if (!inCol2) {
        appendLinkLines(col1El);
      } else {
        appendLinkLines(col2El);
      }
      finished = true;
      return;
    }

    const char = fullText[index];
    text1El.textContent += char;
    index++;

    // After each newline check if col1 has overflowed
    if (char === '\n' && !inCol2 && col1Overflows()) {
      inCol2 = true;
      splitIntoColumns();
      // From here, remaining text types into col2
      // Reassign typing target
      typeNextDesktop._target = text2El;
      col2El.style.display = 'block';
    }

    let delay = baseSpeed + randomBetween(0, speedVariance);
    if ('.!?'.includes(char))  delay += randomBetween(300, 600);
    if (',;:'.includes(char))  delay += randomBetween(100, 300);
    if (Math.random() < pauseChance) delay += randomBetween(pauseDuration[0], pauseDuration[1]);

    setTimeout(typeNextDesktop, delay);
  }

  setTimeout(typeNextDesktop, 800);
}

// ── PHONE ─────────────────────────────────────────────────────────────────────
if (IS_PHONE) {
  const phoneEl  = document.getElementById('phone-content');
  const textPhEl = document.getElementById('text-phone');
  const curPhEl  = document.getElementById('cursor-phone');

  const TOP_OFFSET = window.innerHeight * 0.10;
  phoneEl.style.top = TOP_OFFSET + 'px';

  function adjustPhoneScroll() {
    const maxBottom = window.innerHeight * 0.90;
    const bottom    = phoneEl.getBoundingClientRect().bottom;
    if (bottom > maxBottom) {
      const overshoot  = bottom - maxBottom;
      const currentTop = parseFloat(phoneEl.style.top) || TOP_OFFSET;
      phoneEl.style.transition = 'top 0.4s ease';
      phoneEl.style.top = (currentTop - overshoot) + 'px';
    }
  }

  let index = 0;

  function typeNextPhone() {
    if (finished) return;
    if (index >= fullText.length) {
      appendLinkLines(phoneEl);
      if (curPhEl) curPhEl.remove();
      finished = true;
      return;
    }

    const char = fullText[index];
    textPhEl.textContent += char;
    index++;

    if (char === '\n') adjustPhoneScroll();

    let delay = baseSpeed + randomBetween(0, speedVariance);
    if ('.!?'.includes(char))  delay += randomBetween(300, 600);
    if (',;:'.includes(char))  delay += randomBetween(100, 300);
    if (Math.random() < pauseChance) delay += randomBetween(pauseDuration[0], pauseDuration[1]);

    setTimeout(typeNextPhone, delay);
  }

  setTimeout(typeNextPhone, 800);
}
</script>
